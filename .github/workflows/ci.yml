name: CI

on:
  push:
    branches: [main, 'feature/*', 'fix/*', 'chore/*']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: storysong
          POSTGRES_PASSWORD: storysong_test
          POSTGRES_DB: storysong_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U storysong"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://storysong:storysong_test@localhost:5432/storysong_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

version: '3.8'

services:
  api:
    build: .
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://storyteller:storyteller@db:5432/storyteller
      JWT_SECRET: dev-secret-change-in-production
      STORAGE_TYPE: local
      STORAGE_PATH: ./storage
      LOG_LEVEL: debug
    volumes:
      - ./src:/app/src
      - ./storage:/app/storage
    command: npx tsx watch src/index.ts

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: storyteller
      POSTGRES_PASSWORD: storyteller
      POSTGRES_DB: storyteller
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U storyteller']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
